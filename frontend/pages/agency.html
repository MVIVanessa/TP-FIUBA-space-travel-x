<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/agencies.css" />
    <script src="../config.js"></script>
    <title>Agencies</title>
  </head>
  <body>
    <header>
      <div>
        <a href="/" class="title">TRAVEL-X</a>
      </div>
      <nav>
        <a href="planets.html" class="nav-link">Planets</a>
        <a href="agencies.html" class="nav-link">Agencies</a>
        <a href="bundles.html" class="nav-link">Bundles</a>
      </nav>
    </header>

    <h1 class="page-title"></h1>

    <div class="buttons agency-buttons">
      <a id="update-link" href="">
        <button class="button is-link is-medium">Update</button>
      </a>
      <button id="delete-btn" class="button is-danger is-medium">Delete</button>
    </div>

    <section id="agency-info">
      <div>
        <img id="agency-img" src="" alt="" />
      </div>
      <div id="info-div">
        <h2 id="info-title">INFORMATION:</h2>
        <p class="info">
          <b class="info-bold">About us: </b><span class="info-data"></span>
        </p>
        <p class="info">
          <b class="info-bold">Accepted currency: </b>
          <span class="info-data"></span>
        </p>
        <p class="info">
          <b class="info-bold">Telephone: </b> <span class="info-data"></span>
        </p>
        <p class="info">
          <b class="info-bold">Website: </b>
          <span class="info-data"></span>
        </p>
        <p class="info">
          <b class="info-bold">Rating: </b>
          <span class="info-data"></span>
        </p>
      </div>
    </section>

    <h1 class="page-title">Check out our bundles:</h1>
    <section class="cards-container"></section>

    <script>
      const getAgencyId = () => {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
      };

      const agencyId = getAgencyId();

      /* BUNDLES CARDS */
      const cardCreate = (bundle) => {
        const card = document.createElement('div');
        card.classList.add('card');

        card.innerHTML = `
            <div class="card-image">
              <figure class="image is-4by3">
                <img src="${bundle.images_urls[0]}" alt="Image of excursion" onerror="this.onerror=null; this.src='${config.notFoundImg}'"/>
              </figure>
            </div>
            <div class="card-content">
                <div class="has-text-centered">
                  <a href="./bundle.html?id=${bundle.id}" class="title is-4 card-link">${bundle.duration}</a>
                </div>
            </div>
          `;

        return card;
      };

      /* LOAD */
      const loadAgencyData = (agencyId) => {
        const response = fetch(`${config.baseApiUrl}/agencies/${agencyId}`)
          .then((response) => {
            if (!response.ok) {
              alert('Error loading agency data. Redirecting to agencies...');
              window.location.href = './agencies.html';
            }
            return response.json();
          })
          .then((data) => {
            const title = document.getElementsByClassName('page-title')[0];
            title.textContent = data.name;

            const image = document.getElementById('agency-img');
            image.src = data.logo_url;
            image.onerror = () => {
              image.src = config.notFoundImg;
              image.alt = `Img not found`;
            };

            const infoData = document.getElementsByClassName('info-data');
            infoData[0].textContent = data.about_us;
            infoData[1].textContent = data.accepted_currency;
            infoData[2].textContent = data.telephone;
            infoData[3].textContent = data.website;
            infoData[4].textContent = data.rating;

            const cardsContainer =
              document.getElementsByClassName('cards-container')[0];

            if (data.bundles.length > 0) {
              data.bundles.forEach((bundle) => {
                const card = cardCreate(bundle);
                cardsContainer.appendChild(card);
              });
            } else {
              const notFound = document.createElement('p');
              notFound.textContent = 'This agency has no bundles';
              notFound.style = 'color: black';
              cardsContainer.appendChild(notFound);
            }
          });
      };

      loadAgencyData(agencyId);

      /* REDIRECT TO UPDATE */
      const updateBtn = document.getElementById('update-link');
      updateBtn.href = `./agency-update.html?id=${agencyId}`;

      /* DELETE */
      const deleteBtn = document.getElementById('delete-btn');
      deleteBtn.onclick = () => {
        if (confirm('Are you sure you want to delete this agency?')) {
          const response = fetch(`${config.baseApiUrl}/agencies/${agencyId}`, {
            method: 'DELETE',
          }).then((response) => {
            if (response.ok) {
              window.location.href = './agencies.html';
              alert('Agency deleted');
            } else {
              alert("Couldn't delete the agency");
            }
          });
        }
      };
    </script>

    <footer class="footer">
      <div class="content has-text-centered">
        <p class="footer-copyright">© 2067 Travel-X. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
