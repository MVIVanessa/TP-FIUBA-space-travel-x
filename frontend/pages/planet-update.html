<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/planets.css" />
    <script src="../config.js"></script>

    <title>Planets</title>
  </head>
  <body>
    <header>
      <div>
        <a href="/" class="title">TRAVEL-X</a>
      </div>
      <nav>
        <a href="planets.html" class="nav-link">Planets</a>
        <a href="agencies.html" class="nav-link">Agencies</a>
        <a href="bundles.html" class="nav-link">Bundles</a>
      </nav>
    </header>

    <h1 class="page-title">UPDATE PLANET</h1>

    <form id="planet-form">
      <label for="name">Name*</label>
      <input
        id="name"
        class="input"
        type="text"
        placeholder="Ex. Earth"
        required="true"
      />

      <label for="earth-distance">Earth Distance (KM)*</label>
      <input
        id="earth-distance"
        class="input"
        type="number"
        placeholder="Ex. 800000000"
        required="true"
      />

      <label for="weather">Weather*</label>
      <input
        id="weather"
        class="input"
        type="text"
        placeholder="Ex. Dry and cold"
        required="true"
      />

      <label for="gravity">Gravity*</label>
      <input
        id="gravity"
        class="input"
        type="number"
        placeholder="Ex. 9.8"
        step="0.01"
        required="true"
      />

      <label class="radio-label">Danger Level*</label>
      <div class="radios">
        <label class="radio">
          <input type="radio" name="danger-level" value="NONE" checked />
          NONE
        </label>
        <label class="radio">
          <input type="radio" name="danger-level" value="LOW" />
          LOW
        </label>
        <label class="radio">
          <input type="radio" name="danger-level" value="MODERATE" />
          MODERATE
        </label>
        <label class="radio">
          <input type="radio" name="danger-level" value="HIGH" />
          HIGH
        </label>
        <label class="radio">
          <input type="radio" name="danger-level" value="EXTREME" />
          EXTREME
        </label>
        <label class="radio">
          <input type="radio" name="danger-level" value="X_X" />
          X_X
        </label>
      </div>

      <label class="radio-label">Is Inhabited?*</label>
      <div class="control">
        <label class="radio">
          <input type="radio" name="inhabited" value="YES" checked />
          YES
        </label>
        <label class="radio">
          <input type="radio" name="inhabited" value="NO" />
          NO
        </label>
      </div>

      <label for="url">Image URL</label>
      <input
        id="url"
        class="input is-link"
        type="text"
        placeholder="Ex. http://example-image.com/..."
      />

      <div class="buttons form-buttons">
        <button class="button is-link is-medium" type="submit">UPDATE</button>
        <a id="back-btn" href="">
          <button class="button is-warning is-medium" type="button">
            Go Back
          </button>
        </a>
      </div>
    </form>

    <script>
      /* LOAD */
      const getPlanetId = () => {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
      };

      const loadPlanetData = (planetId) => {
        const response = fetch(`${config.baseApiUrl}/planets/${planetId}`)
          .then((response) => {
            if (!response.ok) {
              alert('Error loading planet data. Redirecting to planets...');
              window.location.href = './planets.html';
            }
            return response.json();
          })
          .then((data) => {
            document.getElementById('name').value = data.name;
            document.getElementById('earth-distance').value =
              data.earth_distance;
            document.getElementById('weather').value = data.weather;
            document.getElementById('gravity').value = data.gravity;
            document.querySelector(
              `input[name="danger-level"][value="${data.danger_level}"]`
            ).checked = true;
            'danger-level'.checked = true;
            document.querySelector(
              `input[name="inhabited"][value="${
                data.danger_level == true ? 'YES' : 'NO'
              }"]`
            ).checked = true;
            document.getElementById('url').value = data.image_url || '';
          });
      };

      const planetId = getPlanetId();
      loadPlanetData(planetId);

      const planetForm = document.getElementById('planet-form');

      planetForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const planetData = {
          name: document.getElementById('name').value,
          earth_distance: Number(
            document.getElementById('earth-distance').value
          ),
          weather: document.getElementById('weather').value,
          gravity: Number(document.getElementById('gravity').value),
          danger_level: document.querySelector(
            'input[name="danger-level"]:checked'
          ).value,
          inhabited:
            document.querySelector('input[name="inhabited"]:checked').value ==
            'YES',
          image_url: document.getElementById('url')?.value,
        };

        /* UPDATE */
        fetch(`${config.baseApiUrl}/planets/${planetId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(planetData),
        }).then((response) => {
          if (response.ok) {
            window.location.href = `./planet.html?id=${planetId}`;
            alert(`${planetData.name} successfully updated!`);
          } else {
            alert('Failed to update planet');
          }
        });
      });

      const backBtn = document.getElementById('back-btn');
      backBtn.href = `./planet.html?id=${planetId}`;
    </script>

    <footer class="footer">
      <div class="content has-text-centered">
        <p class="footer-copyright">© 2067 Travel-X. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
